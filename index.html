<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPrüfung 10. Klasse – Full Edition</title>
    <style>
        :root {
            --bg-color: #06060a;
            --card-bg: rgba(15, 15, 25, 0.85);
            --accent-color: #39ff14;
            --accent-glow: rgba(57, 255, 20, 0.25);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(57, 255, 20, 0.2);
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 10%, #0f1f0e 0%, var(--bg-color) 70%);
            overflow-y: scroll;
            padding: 1rem;
        }

        header {
            width: 100%;
            max-width: 850px;
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 0.3rem;
        }

        main {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .mode-selector {
            display: flex;
            gap: 0.8rem;
            background: var(--card-bg);
            padding: 0.4rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.8rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .progress-container {
            flex: 1;
            margin: 0 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.3s ease;
        }

        .quiz-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .meta-layer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .category-badge {
            background: rgba(57, 255, 20, 0.08);
            color: var(--accent-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .subcategory-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .answer-container {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .answer-container.visible {
            max-height: 1500px;
            opacity: 1;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 1.5rem;
        }

        .answer-text {
            color: #e2e8f0;
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
            white-space: pre-line;
        }

        .keyword-title {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .keyword-badge {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-primary:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-success { background: var(--success-color); color: #fff; }
        .btn-danger { background: var(--danger-color); color: #fff; }
        .btn-success:hover, .btn-danger:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .hidden { display: none !important; }

        .results {
            text-align: center;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 900;
            margin: 1.5rem auto;
            box-shadow: 0 0 25px var(--accent-glow);
        }
    </style>
</head>
<body>

    <header>
        <h1>Bio<span>Prüfung Pro</span></h1>
        <p class="subtitle">Vollständige MSA-Lernkartei mit allen Themenblöcken</p>
    </header>

    <main>
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('flashcard')">Lernmodus (Zufallsmix)</button>
            <button class="mode-btn" onclick="switchMode('exam')">Kurze Prüfungssimulation (10 Fragen)</button>
        </div>

        <div class="info-bar">
            <span id="status-left">Frage: 1/--</span>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <span id="status-right">Modus</span>
        </div>

        <div id="quiz-section">
            <div class="quiz-card">
                <div class="meta-layer">
                    <div class="category-badge" id="category">Themenbereich</div>
                    <div class="subcategory-text" id="subcategory">Unterthema</div>
                </div>
                <div class="question-text" id="question">Lade Frage...</div>
                
                <div class="answer-container" id="answer-box">
                    <div class="answer-text" id="answer">Antwortbereich...</div>
                    <div class="keyword-title">💡 Wichtige Fachbegriffe für die Note 1:</div>
                    <div class="keywords-list" id="keywords"></div>
                </div>

                <div class="actions" id="initial-actions">
                    <button class="btn btn-primary" onclick="revealAnswer()">👁️ Antwort aufdecken</button>
                </div>
                <div class="actions hidden" id="feedback-actions">
                    <button class="btn btn-danger" onclick="submitFeedback(false)">❌ Nicht gewusst</button>
                    <button class="btn btn-success" onclick="submitFeedback(true)">✅ Gewusst!</button>
                </div>
            </div>
        </div>

        <div class="results hidden" id="result-section">
            <h2>Auswertung abgeschlossen</h2>
            <div class="score-circle" id="score-display">0%</div>
            <p id="result-text">Ergebnis-Details</p>
            <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="restartQuiz()">🔄 Erneut starten</button>
        </div>
    </main>

    <script>
        // DIE VOLLSTÄNDIGE FRAGENDATENBANK AUS DEINEN ORIGINAL-PDF-EXTRAKTEN
        const fragenDatenbank = [
            // ZELLBIOLOGIE & GENETIK
