<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioPrüfung 100 – Master Edition</title>
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: rgba(14, 14, 22, 0.85);
            --accent-color: #39ff14;
            --accent-glow: rgba(57, 255, 20, 0.25);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(57, 255, 20, 0.15);
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 10%, #0f1f0e 0%, var(--bg-color) 70%);
            overflow-y: scroll;
            padding: 1rem;
        }

        header {
            width: 100%;
            max-width: 900px;
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 0.3rem;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .mode-selector {
            display: flex;
            gap: 0.8rem;
            background: var(--card-bg);
            padding: 0.4rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.8rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .progress-container {
            flex: 1;
            margin: 0 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.3s ease;
        }

        .quiz-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .meta-layer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .category-badge {
            background: rgba(57, 255, 20, 0.08);
            color: var(--accent-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .subcategory-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .answer-container {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .answer-container.visible {
            max-height: 1500px;
            opacity: 1;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 1.5rem;
        }

        .answer-text {
            color: #e2e8f0;
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
            white-space: pre-line;
        }

        .keyword-title {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .keyword-badge {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-primary:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-success { background: var(--success-color); color: #fff; }
        .btn-danger { background: var(--danger-color); color: #fff; }
        .btn-success:hover, .btn-danger:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .hidden { display: none !important; }

        .results {
            text-align: center;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 900;
            margin: 1.5rem auto;
            box-shadow: 0 0 25px var(--accent-glow);
        }
    </style>
</head>
<body>

    <header>
        <h1>Bio<span>Prüfung 100</span></h1>
        <p class="subtitle">Interaktives Lernportal für den Realschulabschluss</p>
    </header>

    <main>
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('flashcard')">Karteikarten-Modus (Alle Fragen)</button>
            <button class="mode-btn" onclick="switchMode('exam')">Zufällige Prüfungssimulation</button>
        </div>

        <div class="info-bar">
            <span id="status-left">Frage: 1/--</span>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <span id="status-right">Modus</span>
        </div>

        <div id="quiz-section">
            <div class="quiz-card">
                <div class="meta-layer">
                    <div class="category-badge" id="category">Themenbereich</div>
                    <div class="subcategory-text" id="subcategory">Unterthema</div>
                </div>
                <div class="question-text" id="question">Lade Frage...</div>
                
                <div class="answer-container" id="answer-box">
                    <div class="answer-text" id="answer">Antwortbereich...</div>
                    <div class="keyword-title">💡 Diese Fachbegriffe musst du nennen:</div>
                    <div class="keywords-list" id="keywords"></div>
                </div>

                <div class="actions" id="initial-actions">
                    <button class="btn btn-primary" onclick="revealAnswer()">Antwort aufdecken</button>
                </div>
                <div class="actions hidden" id="feedback-actions">
                    <button class="btn btn-danger" onclick="submitFeedback(false)">❌ Nicht gewusst</button>
                    <button class="btn btn-success" onclick="submitFeedback(true)">✅ Gewusst!</button>
                </div>
            </div>
        </div>

        <div class="results hidden" id="result-section">
            <h2>Auswertung abgeschlossen</h2>
            <div class="score-circle" id="score-display">0%</div>
            <p id="result-text">Ergebnis-Details</p>
            <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="restartQuiz()">Erneut starten</button>
        </div>
    </main>

    <script>
        // =========================================================================
        // FRAGEN-POOL: Hier kannst du nahtlos bis zu 100 Fragen ergänzen!
        // =========================================================================
        const fragenDatenbank = [
            {
                kategorie: "Genetik",
                unterkategorie: "Karyogramm & Chromosomen",
                frage: "Was versteht man unter einem Karyogramm und wie unterscheidet sich der Chromosomensatz von Mann und Frau?",
                antwort: "Ein Karyogramm ist das geordnete Bild aller Chromosomen einer Zelle während der Metaphase. Beim Menschen gibt es 46 Chromosomen (23 Paare).\n\nUnterschied: Die ersten 22 Paare (Autosomen) sind bei Mann und Frau gleich. Das 23. Paar sind die Gonosomen (Geschlechtschromosomen). Frauen haben zwei X-Chromosomen (XX), Männer ein X- und ein kleineres Y-Chromosom (XY).",
                begriffe: ["Karyogramm", "Autosomen", "Gonosomen", "XX-Chromosomen", "XY-Chromosomen"]
            },
            {
                kategorie: "Genetik",
                unterkategorie: "Mitose (Zellteilung)",
                frage: "Nenne die 4 Phasen der Mitose und beschreibe kurz, was in der Anaphase passiert.",
                antwort: "Die Phasen heißen Prophase, Metaphase, Anaphase und Telophase.\n\nIn der Anaphase werden die Zwei-Chromatid-Chromosomen am Centromer getrennt. Die Spindelfasern verkürzen sich und ziehen die Ein-Chromatid-Chromosomen zu den entgegengesetzten Polen der Zelle. Dadurch erhält jeder Pol einen identischen Satz Erbinformationen.",
                begriffe: ["Prophase", "Metaphase", "Anaphase", "Telophase", "Spindelfaserapparat", "Centromer"]
            },
            {
                kategorie: "Ökologie",
                unterkategorie: "Abiotische Faktoren",
                frage: "Erkläre das 'Gesetz des Minimums' (Minimumgesetz) anhand eines Beispiels.",
                antwort: "Das Minimumgesetz (von Justus von Liebig) besagt, dass das Wachstum von Pflanzen durch diejenige Ressource begrenzt wird, die im Verhältnis zum Bedarf in der geringsten Menge vorhanden ist (Knappster Faktor).\n\nBeispiel: Selbst wenn eine Pflanze perfekt mit Licht, Wasser und Stickstoff versorgt ist, kann sie nicht weiter wachsen, wenn es ihr an Magnesium fehlt. Magnesium ist hier der Minimumfaktor.",
                begriffe: ["Minimumgesetz", "Minimumfaktor", "Liebigsches Fass", "Wachstumsbegrenzung"]
            }
            // Tipp: Kopiere einfach den obigen Block, setze ein Komma dazwischen und füge deine weiteren Fragen hier ein!
        ];

        let aktuelleFragen = [];
        let index = 0;
        let gewusstZaehler = 0;
        let aktuellerModus = 'flashcard';

        function initQuiz() {
            if(aktuellerModus === 'flashcard') {
                aktuelleFragen = [...fragenDatenbank];
                document.getElementById('status-right').innerText = "Modus: Alle Karteikarten";
            } else {
                // Zieht für die Prüfungssimulation zufällig 10 Fragen aus dem Pool
                aktuelleFragen = [...fragenDatenbank].sort(() => 0.5 - Math.random()).slice(0, 10);
                document.getElementById('status-right').innerText = "Modus: Random Prüfung (10 Qs)";
            }
            index = 0;
            gewusstZaehler = 0;
            document.getElementById('quiz-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            showFrage();
        }

        function showFrage() {
            if(index >= aktuelleFragen.length) {
                endQuiz();
                return;
            }

            const f = aktuelleFragen[index];
            document.getElementById('category').innerText = f.kategorie;
            document.getElementById('subcategory').innerText = f.unterkategorie;
            document.getElementById('question').innerText = f.frage;
            document.getElementById('answer').innerText = f.antwort;

            const kwContainer = document.getElementById('keywords');
            kwContainer.innerHTML = '';
            f.begriffe.forEach(b => {
                const badge = document.createElement('span');
                badge.className = 'keyword-badge';
                badge.innerText = b;
                kwContainer.appendChild(badge);
            });

            document.getElementById('answer-box').classList.remove('visible');
            document.getElementById('initial-actions').classList.remove('hidden');
            document.getElementById('feedback-actions').classList.add('hidden');

            document.getElementById('status-left').innerText = `Frage: ${index + 1}/${aktuelleFragen.length}`;
            const prozent = (index / aktuelleFragen.length) * 100;
            document.getElementById('progress').style.width = `${prozent}%`;
        }

        function revealAnswer() {
            document.getElementById('answer-box').classList.add('visible');
            document.getElementById('initial-actions').classList.add('hidden');
            document.getElementById('feedback-actions').classList.remove('hidden');
        }

        function submitFeedback(warRichtig) {
            if(warRichtig) gewusstZaehler++;
            index++;
            showFrage();
        }

        function switchMode(modus) {
            aktuellerModus = modus;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            initQuiz();
        }

        function endQuiz() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            const prozent = Math.round((gewusstZaehler / aktuelleFragen.length) * 100);
            document.getElementById('score-display').innerText = `${prozent}%`;
            document.getElementById('progress').style.width = `100%`;

            let note = "";
            if(prozent >= 90) note = "Note: 1 - Sensationell!";
            else if(prozent >= 75) note = "Note: 2 - Sehr gut vorbereitet!";
            else if(prozent >= 55) note = "Note: 3 - Solide, lern weiter!";
            else note = "Note: 4 oder schlechter - Wiederhole die Fachbegriffe!";

            document.getElementById('result-text').innerHTML = `Ergebnis: <b>${gewusstZaehler} von ${aktuelleFragen.length}</b> richtig gewusst.<br><br>${note}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
